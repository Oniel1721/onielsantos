<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .spiral { fill: none; stroke: #000; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .spiral { stroke: #fff; }
    }
  </style>
  <!-- Outer ring: r=43, ~350° arc, gap at ~5 o'clock -->
  <circle class="spiral" cx="50" cy="50" r="43" stroke-width="14"
          stroke-dasharray="263 8"
          transform="rotate(56 50 50)"/>
  <!-- Second ring: r=28, ~270° arc -->
  <circle class="spiral" cx="50" cy="50" r="28" stroke-width="9"
          stroke-dasharray="132 44"
          transform="rotate(46 50 50)"/>
  <!-- Third ring: r=16, ~230° arc -->
  <circle class="spiral" cx="50" cy="50" r="16" stroke-width="6"
          stroke-dasharray="64 36"
          transform="rotate(316 50 50)"/>
  <!-- Inner curl: r=7, ~200° arc -->
  <circle class="spiral" cx="50" cy="50" r="7" stroke-width="4"
          stroke-dasharray="25 19"
          transform="rotate(186 50 50)"/>
</svg>
